<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">
  <div class="card backend-selector">
          <!--Back End selection drop down -->
      <h2>Environment Settings</h2>
      <p class="section-subtitle">Switch between different cloud backends for the demo</p>
      <div class="actions-row">
        <label for="backendSelect"><strong>Active Backend:</strong></label>
        <select id="backendSelect" onchange="updateBackend()">
          <option value="LOCAL">Local Testing (Flask)</option>
          <option value="EC2">EC2 Instance</option>
          <option value="ECS" selected>ECS Fargate (Load Balancer)</option>
          <option value="LAMBDA">AWS Lambda (API Gateway)</option>
        </select>
      </div>
      <p class="section-subtitle">API Endpoint: <code id="currentApiUrl"></code></p>
    </div>
    <!-- END OF DROPDOWN -->
  </div>
</div>



  <div class="container">
    <div class="auth-box">
      <h1>Music Subscription App</h1>
      <h2>Login to your account</h2>

      <input type="email" id="loginEmail" placeholder="Email" />
      <input type="password" id="loginPassword" placeholder="Password" />

      <div class="actions-row">
        <button onclick="login()">Login</button>
      </div>

      <div id="loginMessage" class="message-card"></div>

      <p>
        Don’t have an account?
        <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
